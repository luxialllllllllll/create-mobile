services:
  - type: web
    name: create-ex-mobile
    runtime: node
    rootDir: web-version
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MODEL_PROVIDER
        value: gemini
      - key: GEMINI_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta/openai
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
